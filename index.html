<!DOCTYPE html>
<html>
<head>
    <title>UI预览工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            margin: 0; 
            background: #000; 
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: Arial; 
        }
        
        /* 壁纸层 - 全屏拉伸铺满 */
        #wallpaper { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            background: url('assets/background/default.png') no-repeat center center;
            background-size: 100% 100%;
            z-index: 1;
        }
        
        /* 桌面层 - 全屏拉伸铺满 */
        #desktopLayer { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            background: url('assets/desktop/defaut.png') no-repeat center center;
            background-size: 100% 100%;
            z-index: 2; /* 位于壁纸层之上，UI元素层之下 */
        }
        
        /* UI元素层 */
        .ui-element { 
            position: fixed; 
            z-index: 3; 
            border: 3px solid red; 
            background: rgba(255,255,255,0.8); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-weight: bold;
            font-size: 14px;
        }
        
        /* 各UI元素位置和大小（基于2560x1440比例换算到vw/vh） */
        #referenceDesktop { top: 2vh; left: 2vw; width: 12vw; height: 12vh; }
        #statusBar { top: 1vh; left: 15vw; width: 35vw; height: 5vh; background: rgba(255,182,193,0.9); }
        #buttons { top: 15vh; left: 3vw; width: 12vw; height: 6vh; background: rgba(255,182,193,0.7); }
        #chatBox { top: 15vh; right: 3vw; width: 18vw; height: 15vh; background: rgba(255,255,255,0.95); }
        #popupTip { bottom: 10vh; right: 3vw; width: 16vw; height: 10vh; background: rgba(255,255,255,0.8); }
        #floatWindow1 { top: 25vh; left: 8vw; width: 14vw; height: 12vh; background: rgba(255,255,255,0.8); }
        #moodUI { top: 2vh; right: 5vw; width: 5vw; height: 5vw; max-width: 80px; max-height: 80px; background: rgba(255,192,203,0.9); border-radius: 50%; }
        
        /* 编辑按钮 */
        #editBtn { 
            position: fixed; 
            top: 20px; 
            left: 20px; 
            padding: 15px 25px; 
            background: #4CAF50; 
            color: white; 
            border: none; 
            font-size: 18px; 
            cursor: pointer; 
            border-radius: 5px; 
            z-index: 1000; 
        }
        
        /* 编辑面板 */
        #editPanel { 
            position: fixed; 
            top: 80px; 
            right: 20px; 
            background: rgba(0,0,0,0.9); 
            color: white; 
            padding: 20px; 
            border-radius: 10px; 
            z-index: 1000; 
            display: none; 
            width: 320px; 
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .control-group { 
            margin: 10px 0; 
            padding: 10px; 
            background: rgba(255,255,255,0.1); 
            border-radius: 5px; 
        }
        
        .btn { 
            background: #4CAF50; 
            color: white; 
            border: none; 
            padding: 8px 12px; 
            margin: 3px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 12px; 
        }
        
        .btn:hover { background: #45a049; }
        
        .reset-all-btn { 
            background: #f44336; 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            margin: 10px 0 0 0; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            font-size: 14px; 
        }
        
        .reset-all-btn:hover { background: #da190b; }
        
        /* 隐藏的文件输入 */
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <button id="editBtn" onclick="toggleEdit()">编辑模式 (`)</button>
    
    <!-- 壁纸层 - 全屏 -->
    <div id="wallpaper"></div>
    
    <!-- 桌面层 - 全屏 -->
    <div id="desktopLayer"></div>
    
    <!-- UI元素层 -->
    <div class="ui-element" id="referenceDesktop">参考桌面</div>
    <div class="ui-element" id="statusBar">状态栏</div>
    <div class="ui-element" id="buttons">按钮区</div>
    <div class="ui-element" id="chatBox">聊天框</div>
    <div class="ui-element" id="popupTip">弹出提示</div>
    <div class="ui-element" id="floatWindow1">其他浮窗1</div>
    <div class="ui-element" id="moodUI">心情UI</div>
    
    <!-- 隐藏的文件输入框 -->
    <input type="file" id="wallpaperInput" accept=".bmp,.jpg,.jpeg,.png" onchange="handleFileSelect(this, 'wallpaper')">
    <input type="file" id="desktopInput" accept=".bmp,.jpg,.jpeg,.png" onchange="handleFileSelect(this, 'referenceDesktop')">
    <input type="file" id="statusbarInput" accept=".bmp,.jpg,.jpeg,.png" onchange="handleFileSelect(this, 'statusBar')">
    <input type="file" id="buttonInput" accept=".bmp,.jpg,.jpeg,.png" onchange="handleFileSelect(this, 'buttons')">
    <input type="file" id="chatboxInput" accept=".bmp,.jpg,.jpeg,.png" onchange="handleFileSelect(this, 'chatBox')">
    <input type="file" id="popupInput" accept=".bmp,.jpg,.jpeg,.png" onchange="handleFileSelect(this, 'popupTip')">
    <input type="file" id="floatInput" accept=".bmp,.jpg,.jpeg,.png" onchange="handleFileSelect(this, 'floatWindow1')">
    <input type="file" id="moodInput" accept=".bmp,.jpg,.jpeg,.png" onchange="handleFileSelect(this, 'moodUI')">
    <input type="file" id="desktopLayerInput" accept=".bmp,.jpg,.jpeg,.png" onchange="handleFileSelect(this, 'desktopLayer')">
    
    <!-- 编辑面板 -->
    <div id="editPanel">
        <h3>编辑模式</h3>
        
        <div class="control-group">
            <strong>🖼️ 更换壁纸</strong><br>
            <button class="btn" onclick="document.getElementById('wallpaperInput').click()">更换</button>
            <button class="btn" onclick="resetWallpaper()">重置</button>
        </div>
        
        <div class="control-group">
            <strong>🖥️ 更换桌面层</strong><br>
            <button class="btn" onclick="document.getElementById('desktopLayerInput').click()">更换</button>
            <button class="btn" onclick="resetDesktop()">重置</button>
        </div>
        
        <div class="control-group">
            <strong>📱 更换参考桌面</strong><br>
            <button class="btn" onclick="document.getElementById('desktopInput').click()">更换</button>
            <button class="btn" onclick="resetElement('referenceDesktop', '参考桌面')">重置</button>
        </div>
        
        <div class="control-group">
            <strong>📊 更换状态栏</strong><br>
            <button class="btn" onclick="document.getElementById('statusbarInput').click()">更换</button>
            <button class="btn" onclick="resetElement('statusBar', '状态栏')">重置</button>
        </div>
        
        <div class="control-group">
            <strong>🔘 更换按钮</strong><br>
            <button class="btn" onclick="document.getElementById('buttonInput').click()">更换</button>
            <button class="btn" onclick="resetElement('buttons', '按钮区')">重置</button>
        </div>
        
        <div class="control-group">
            <strong>💬 更换聊天框</strong><br>
            <button class="btn" onclick="document.getElementById('chatboxInput').click()">更换</button>
            <button class="btn" onclick="resetElement('chatBox', '聊天框')">重置</button>
        </div>
        
        <div class="control-group">
            <strong>⚠️ 更换弹出提示</strong><br>
            <button class="btn" onclick="document.getElementById('popupInput').click()">更换</button>
            <button class="btn" onclick="resetElement('popupTip', '弹出提示')">重置</button>
        </div>
        
        <div class="control-group">
            <strong>🪟 更换其他浮窗1</strong><br>
            <button class="btn" onclick="document.getElementById('floatInput').click()">更换</button>
            <button class="btn" onclick="resetElement('floatWindow1', '其他浮窗1')">重置</button>
        </div>
        
        <div class="control-group">
            <strong>❤️ 更换心情值UI</strong><br>
            <button class="btn" onclick="document.getElementById('moodInput').click()">更换</button>
            <button class="btn" onclick="resetElement('moodUI', '心情UI')">重置</button>
        </div>
        
        <button class="reset-all-btn" onclick="resetAll()">🔄 全部重置</button>
    </div>

    <script>
        // 默认配置
        const defaults = {
            wallpaper: 'assets/background/default.png',
            desktopLayer: 'assets/desktop/defaut.png',
            referenceDesktop: null,
            statusBar: null,
            buttons: null,
            chatBox: null,
            popupTip: null,
            floatWindow1: null,
            moodUI: null
        };
        
        // 切换编辑面板
        function toggleEdit() {
            const panel = document.getElementById('editPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }
        
        // 处理文件选择
        function handleFileSelect(input, elementId) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const element = document.getElementById(elementId);
                element.style.background = 'url(' + e.target.result + ') no-repeat center center';
                element.style.backgroundSize = '100% 100%';
                element.innerHTML = '';
            };
            reader.readAsDataURL(file);
            
            // 清空input，允许重复选择同一文件
            input.value = '';
        }
        
        // 重置壁纸
        function resetWallpaper() {
            const wallpaper = document.getElementById('wallpaper');
            wallpaper.style.background = 'url("' + defaults.wallpaper + '") no-repeat center center';
            wallpaper.style.backgroundSize = '100% 100%';
        }
        
        // 重置桌面层
        function resetDesktop() {
            const desktop = document.getElementById('desktopLayer');
            desktop.style.background = 'url("' + defaults.desktopLayer + '") no-repeat center center';
            desktop.style.backgroundSize = '100% 100%';
        }
        
        // 重置单个元素
        function resetElement(id, text) {
            const element = document.getElementById(id);
            element.style.background = '';
            element.innerHTML = text;
            
            // 恢复默认背景色
            if (id === 'statusBar') element.style.background = 'rgba(255,182,193,0.9)';
            else if (id === 'buttons') element.style.background = 'rgba(255,182,193,0.7)';
            else if (id === 'chatBox') element.style.background = 'rgba(255,255,255,0.95)';
            else if (id === 'popupTip' || id === 'floatWindow1') element.style.background = 'rgba(255,255,255,0.8)';
            else if (id === 'moodUI') element.style.background = 'rgba(255,192,203,0.9)';
            else element.style.background = 'rgba(255,255,255,0.8)';
        }
        
        // 全部重置
        function resetAll() {
            resetWallpaper();
            resetDesktop();
            resetElement('referenceDesktop', '参考桌面');
            resetElement('statusBar', '状态栏');
            resetElement('buttons', '按钮区');
            resetElement('chatBox', '聊天框');
            resetElement('popupTip', '弹出提示');
            resetElement('floatWindow1', '其他浮窗1');
            resetElement('moodUI', '心情UI');
            alert('全部重置完成！');
        }
        
        // 快捷键
        document.addEventListener('keydown', function(e) {
            if (e.key === '`') {
                e.preventDefault();
                toggleEdit();
            }
        });
    </script>
</body>
</html>
