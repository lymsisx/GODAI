<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修复验证测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .test-result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .warning {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        .log {
            font-family: 'Courier New', monospace;
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>UI预览工具修复验证</h1>
    
    <div id="test-results">
        <div class="test-result warning" id="status">正在运行测试...</div>
    </div>
    
    <div class="log" id="log"></div>
    
    <script>
        const log = document.getElementById('log');
        const status = document.getElementById('status');
        
        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            log.textContent += `[${timestamp}] ${message}\n`;
            console.log(message);
        }
        
        function updateStatus(message, type = 'info') {
            status.textContent = message;
            status.className = `test-result ${type}`;
        }
        
        async function runTests() {
            addLog('开始测试修复...');
            
            try {
                // 测试1: 加载App类
                addLog('测试1: 加载App.js...');
                const appResponse = await fetch('./js/core/App.js');
                if (!appResponse.ok) throw new Error(`加载App.js失败: ${appResponse.status}`);
                const appCode = await appResponse.text();
                
                // 检查关键修复
                let test1Passed = true;
                const checks = [
                    { name: 'addElement改为registerElement', pattern: /\.registerElement\(this\.statusBar\)/ },
                    { name: 'StatusBarUI传入id和type参数', pattern: /new StatusBarUI\(\s*\{[^}]*id:[^}]*type:[^}]*\}/s },
                    { name: '使用Storage.saveElementConfig', pattern: /Storage\.saveElementConfig\('statusBar'/ }
                ];
                
                for (const check of checks) {
                    if (check.pattern.test(appCode)) {
                        addLog(`✓ ${check.name}`);
                    } else {
                        addLog(`✗ ${check.name} 未找到`);
                        test1Passed = false;
                    }
                }
                
                if (!test1Passed) {
                    updateStatus('App.js修复不完整', 'error');
                    return;
                }
                
                // 测试2: 加载StatusBarUI类
                addLog('\n测试2: 加载StatusBarUI.js...');
                const sbResponse = await fetch('./js/ui/StatusBarUI.js');
                if (!sbResponse.ok) throw new Error(`加载StatusBarUI.js失败: ${sbResponse.status}`);
                const sbCode = await sbResponse.text();
                
                let test2Passed = true;
                const sbChecks = [
                    { name: 'exportConfig返回扁平结构', pattern: /exportConfig\(\)\s*\{[^}]*x:\s*this\.config\.basePosition[^}]*y:/s },
                    { name: 'importConfig处理扁平结构', pattern: /importConfig\(config\)\s*\{[^}]*const\s*\{[^}]*x,[^}]*y,[^}]*width,[^}]*height/s },
                    { name: 'update方法存在', pattern: /update\(updates\)\s*\{[^}]*importConfig\(newConfig\)/s }
                ];
                
                for (const check of sbChecks) {
                    if (check.pattern.test(sbCode)) {
                        addLog(`✓ ${check.name}`);
                    } else {
                        addLog(`✗ ${check.name} 未找到`);
                        test2Passed = false;
                    }
                }
                
                if (!test2Passed) {
                    updateStatus('StatusBarUI.js修复不完整', 'error');
                    return;
                }
                
                // 测试3: 检查Storage模块
                addLog('\n测试3: 检查Storage模块...');
                const storageResponse = await fetch('./js/utils/Storage.js');
                if (!storageResponse.ok) {
                    addLog('⚠ Storage.js未找到，跳过此测试');
                } else {
                    const storageCode = await storageResponse.text();
                    if (storageCode.includes('saveElementConfig') && storageCode.includes('loadElementConfig')) {
                        addLog('✓ Storage模块包含必要方法');
                    } else {
                        addLog('✗ Storage模块缺少必要方法');
                        test2Passed = false;
                    }
                }
                
                // 最终结果
                addLog('\n所有测试完成！');
                updateStatus('✓ 所有关键修复已确认应用', 'success');
                
            } catch (error) {
                addLog(`测试失败: ${error.message}`);
                updateStatus('测试执行失败', 'error');
            }
        }
        
        // 运行测试
        runTests();
    </script>
</body>
</html>
